# Docker Compose - Development Environment Only
# This configuration is for local development with hot-reload
# Not suitable for production use
#
# Usage: docker compose up

version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: codeinit-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codeinit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeinit_password}
      POSTGRES_DB: ${DATABASE_NAME:-codeinit}
    ports:
      - "5432:5432"
    volumes:
      - codeinit-postgres-data:/var/lib/postgresql
    networks:
      - codeinit-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: codeinit-backend
    depends_on:
      - postgres
    # Secrets (JWT_SECRET, VAPID keys, etc.) live in backend/.env, which is
    # gitignored, instead of being hardcoded here.
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      # Overrides backend/.env's DATABASE_URL: inside the Docker network the
      # database is reachable at the "postgres" hostname, not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-codeinit}:${POSTGRES_PASSWORD:-codeinit_password}@postgres:5432/${DATABASE_NAME:-codeinit}
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/scripts:/app/backend/scripts
      - ./backend/prisma:/app/backend/prisma
      - ./backend/package.json:/app/backend/package.json
      - ./backend/prisma.config.ts:/app/backend/prisma.config.ts
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
    # This is an npm workspaces monorepo, so dependencies are installed from
    # the repo root. Running npm install here (before npm run dev) picks up
    # any package added to package.json since the image was last built,
    # without needing a manual `docker compose build`.
    command: sh -c "cd /app && npm install --legacy-peer-deps && cd backend && npm run dev"
    networks:
      - codeinit-network

  # Frontend runs locally on the host machine, not in Docker
  # Run locally with: npm run dev (from frontend directory)
  # The local frontend will connect to the backend running in Docker on localhost:3001

volumes:
  codeinit-postgres-data:
    driver: local

networks:
  codeinit-network:
    driver: bridge
