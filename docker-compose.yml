services:
  postgres:
    image: postgres:16-alpine
    container_name: codeinit-postgres
    environment:
      POSTGRES_USER: codeinit
      POSTGRES_PASSWORD: codeinit
      POSTGRES_DB: codeinit_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeinit -d codeinit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeinit-network

volumes:
  postgres_data:

networks:
  codeinit-network:
    driver: bridge
