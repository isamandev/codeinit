# Docker Compose - Production Environment
# Usage: docker compose -f docker-compose.prod.yml up
#
# This configuration is optimized for production deployment with:
# - Multi-stage optimized builds
# - Health checks for all services
# - No volume mounts
# - Graceful shutdown handling
# - Resource constraints
# - Production logging

version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: codeinit-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - codeinit-postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codeinit-prod-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: codeinit-backend-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${DB_PORT:-5432}/${DATABASE_NAME}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - codeinit-prod-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: codeinit-frontend-prod
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - codeinit-prod-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

volumes:
  codeinit-postgres-prod-data:
    driver: local

networks:
  codeinit-prod-network:
    driver: bridge
